version: '3.8'

services:
  api:
    build: .
    container_name: hexagonal_products_api
    ports:
      - "3333:3000"
    environment:
      - PORT=3000
      - DB_PATH=/app/data/database.db
      - NODE_ENV=production
    volumes:
      - api_data:/app/data
    restart: unless-stopped

volumes:
  api_data:
